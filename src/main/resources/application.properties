spring.application.name=LifeComposer
spring.datasource.url=jdbc:sqlite:data.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.web.error.include-stacktrace=never
spring.web.error.include-message=never
spring.web.error.whitelabel.enabled=false

server.port=18000

logging.level.web = INFO
spring.devtools.add-properties = true

spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true

spring.web.resources.add-mappings=true
spring.web.resources.static-locations=file:./external/static/
spring.thymeleaf.prefix=file:./external/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=false

# æä»¶ä¸ä¼ éç½®
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

