<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理员控制台</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
        .container { max-width: 860px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 12px rgba(0,0,0,.08); }
        h1 { text-align: center; color: #333; margin-bottom: 24px; }
        .nav-links { text-align: center; margin: 24px 0; }
        .nav-link { display: inline-block; margin: 10px; padding: 12px 24px; background: #007bff; color: #fff; text-decoration: none; border-radius: 6px; }
        .nav-link:hover { background: #0056b3; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .logout-btn { border: none; background: #dc3545; color: #fff; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="toolbar">
        <a href="/">← 返回首页</a>
        <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>

    <h1>管理员控制台</h1>

    <div class="nav-links">
        <a href="/admin/user" class="nav-link">用户管理</a>
        <a href="/admin/feedback_management" class="nav-link">反馈管理</a>
    </div>
</div>

<script>
    async function logout() {
        const resp = await fetch('/api/users/logout', { method: 'POST' });
        const msg = await resp.text();
        alert(msg || '已退出');
        location.href = '/';
    }
</script>
</body>
</html>
